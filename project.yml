name: QuillStack
options:
  bundleIdPrefix: com.quillstack
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  # Pinned here, not left to Xcode. Xcode writes DEVELOPMENT_TEAM back into
  # project.pbxproj, which `xcodegen generate` then discards — signing silently
  # drifts, and CloudKit rejects a container owned by a different team.
  DEVELOPMENT_TEAM: HZQB6JS358
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    # 8.58.0 is the first floor guaranteed to ship Sentry's own PrivacyInfo.xcprivacy.
    from: 8.58.0
targets:
  QuillStack:
    type: application
    platform: iOS
    sources:
      - path: QuillStack
        excludes:
          - Info.plist
          - "*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: QuillStack/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.quillstack.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        DWARF_DSYM_FILE_SHOULD_ACCOMPANY_PRODUCT: NO
      configs:
        # aps-environment and icloud-container-environment must differ between
        # a local Xcode build (Development CloudKit) and an archive bound for
        # TestFlight (Production CloudKit). One entitlements file cannot do both.
        Debug:
          CODE_SIGN_ENTITLEMENTS: QuillStack/QuillStack.Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: QuillStack/QuillStack.Release.entitlements
    preBuildScripts:
      - script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet --lenient
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
    dependencies:
      - package: Sentry
        product: SentrySwiftUI
    resources:
      - path: QuillStack/Assets.xcassets
      - path: QuillStack/Resources/Fonts
        buildPhase: resources
  QuillStackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QuillStackTests
    dependencies:
      - target: QuillStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quillstack.tests
        GENERATE_INFOPLIST_FILE: YES
  QuillStackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: QuillStackUITests
    dependencies:
      - target: QuillStack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quillstack.uitests
        GENERATE_INFOPLIST_FILE: YES
