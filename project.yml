name: QuillStack
options:
  bundleIdPrefix: com.quillstack
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: 8.0.0
targets:
  QuillStack:
    type: application
    platform: iOS
    sources:
      - path: QuillStack
        excludes:
          - Info.plist
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        INFOPLIST_FILE: QuillStack/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.quillstack.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
    dependencies:
      - package: Sentry
        product: SentrySwiftUI
    resources:
      - path: QuillStack/Assets.xcassets
      - path: QuillStack/Resources/Fonts
        buildPhase: resources
