name: QuillStack
options:
  bundleIdPrefix: com.quillstack
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Debug
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    minorVersion: 2.30.6
targets:
  QuillStack:
    type: application
    platform: iOS
    sources:
      - path: QuillStack
        excludes:
          - Info.plist
    dependencies:
      - package: mlx-swift-lm
        product: MLXVLM
    settings:
      base:
        INFOPLIST_FILE: QuillStack/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.quillstack.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
    resources:
      - path: QuillStack/Assets.xcassets
      - path: QuillStack/Resources/Fonts
        buildPhase: resources
