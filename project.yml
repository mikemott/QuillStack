name: QuillStack
options:
  bundleIdPrefix: com.quillstack
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
targets:
  QuillStack:
    type: application
    platform: iOS
    sources:
      - path: QuillStack
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "QuillStack uses the camera to capture notes and documents."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "QuillStack can tag captures with your location for easier organization."
        PRODUCT_BUNDLE_IDENTIFIER: com.quillstack.app
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - path: Assets.xcassets
