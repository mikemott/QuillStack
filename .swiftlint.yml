# SwiftLint Configuration — QuillStack
# Convention: minimal rules, warnings not errors, match project style

excluded:
  - QuillStack.xcodeproj
  - .build

# Relax defaults to match project conventions
line_length:
  warning: 160
  error: 250
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 1
  max_length: 60
  excluded:
    - id
    - x
    - y
    - i

function_body_length:
  warning: 80
  error: 130

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

large_tuple:
  warning: 4

cyclomatic_complexity:
  warning: 15
  error: 25

trailing_comma:
  mandatory_comma: false

# Disable rules that conflict with project style
disabled_rules:
  - trailing_whitespace
  - implicit_optional_initialization

# Opt-in rules worth enabling
opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_string
  - first_where
  - force_unwrapping
  - last_where
  - sorted_first_last
  - unavailable_function
  - unowned_variable_capture
